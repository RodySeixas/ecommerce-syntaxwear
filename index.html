<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntaxWear - Tênis e Sneakers Online</title>
    <meta name="description"
        content="Descubra a coleção exclusiva de tênis e sneakers da SyntaxWear. Encontre os modelos mais estilosos e confortáveis para elevar seu visual. Compre online agora!">

    <link rel="stylesheet" href="./css/reset.css" class="css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/hero.css">
    <link rel="stylesheet" href="./css/produto-categoria.css">
</head>

<body>
    <!-- Header - Navegação e identidade da marca -->
    <header class="header">
        <h1 class="logo">
            <a href="/" title="SyntaxWear - Tenis e Sneakers Online">
                <img src="./assets/img/logo/logo.svg" alt="SyntaxWear - Tênis e Sneakers Online">
            </a>
        </h1>

        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>

        <!-- Menu secundário com links utilitários -->
        <nav class="nav-secondary" aria-label="Links úteis">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#"><img src="./assets/img/icons/user.svg" alt="Perfil" /></a></li>
                <li><a href="#"><img src="./assets/img/icons/help.svg" alt="Ajuda" /></a></li>
                <li><a href="#"><img src="./assets/img/icons/cart.svg" alt="Carrinho" /></a></li>
            </ul>
        </nav>
    </header>

    <!-- Seção de Autenticação -->
    <section class="auth">
    </section>

    <!-- Seção Principal - Home -->
    <main class="home">

        <!-- Seção de Produtos -->
        <section class="hero-section">

            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-Subtitle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos</a>
                        <a class="btn btn-filled" href="#">comprar</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Seção de Produto Individual -->
        <section class="categorias-section">

                <div class="category-card casual">
                    <a href="#" class="category-link">
                        <span class="overlay"> </span>
                        <span class="category-name btn btn-outline ">Casual</span>
                    </a>
                </div>

                <div class="category-card esporte">
                    <a href="#">
                        <span class="overlay"> </span>
                        <span class="category-name btn btn-outline ">Esporte</span>
                    </a>
                </div>

                <div class="category-card moderno">
                    <a href="#">
                        <span class="overlay"> </span>
                        <span class="category-name btn btn-outline ">Moderno</span>
                    </a>
                </div>

                <div class="category-card futurista">
                    <a href="#">
                        <span class="overlay"> </span>
                        <span class="category-name btn btn-outline ">Futurista</span>
                    </a>
                </div>

        </section>
        <!-- Seção de Carrinho -->
        <section class="featured-products-section">
        </section>

        <!-- Seção de Checkout -->
        <section class="checkout">
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
    </footer>
</body>

</html>
